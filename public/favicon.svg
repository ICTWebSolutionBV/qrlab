<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Green rounded background -->
  <rect width="32" height="32" rx="7" fill="#059669"/>
  <!-- QR code icon (white) -->
  <!-- Top-left finder pattern -->
  <rect x="5" y="5" width="9" height="9" rx="1.5" fill="white"/>
  <rect x="7" y="7" width="5" height="5" rx="0.5" fill="#059669"/>
  <rect x="8.5" y="8.5" width="2" height="2" rx="0.25" fill="white"/>
  <!-- Top-right finder pattern -->
  <rect x="18" y="5" width="9" height="9" rx="1.5" fill="white"/>
  <rect x="20" y="7" width="5" height="5" rx="0.5" fill="#059669"/>
  <rect x="21.5" y="8.5" width="2" height="2" rx="0.25" fill="white"/>
  <!-- Bottom-left finder pattern -->
  <rect x="5" y="18" width="9" height="9" rx="1.5" fill="white"/>
  <rect x="7" y="20" width="5" height="5" rx="0.5" fill="#059669"/>
  <rect x="8.5" y="21.5" width="2" height="2" rx="0.25" fill="white"/>
  <!-- Data dots (bottom-right area) -->
  <rect x="18" y="18" width="2" height="2" rx="0.4" fill="white"/>
  <rect x="21" y="18" width="2" height="2" rx="0.4" fill="white"/>
  <rect x="24" y="18" width="3" height="2" rx="0.4" fill="white"/>
  <rect x="18" y="21" width="3" height="2" rx="0.4" fill="white"/>
  <rect x="22" y="21" width="2" height="2" rx="0.4" fill="white"/>
  <rect x="18" y="24" width="2" height="3" rx="0.4" fill="white"/>
  <rect x="21" y="24" width="2" height="3" rx="0.4" fill="white"/>
  <rect x="24" y="24" width="3" height="3" rx="0.4" fill="white"/>
  <!-- Timing dots -->
  <rect x="15" y="8.5" width="2" height="2" rx="0.4" fill="white"/>
  <rect x="8.5" y="15" width="2" height="2" rx="0.4" fill="white"/>
</svg>
